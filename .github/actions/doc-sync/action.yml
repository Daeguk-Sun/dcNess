name: 'dcness doc-sync validation'
description: 'Validate generated docs/index.md, docs/architecture.md, and /design artifact structure.'
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: '20'

    - name: Validate docs/index.md epic table
      shell: bash
      run: |
        set -euo pipefail
        node "${{ github.action_path }}/../../../scripts/aggregate_index_map.mjs" --check

    - name: Validate docs/architecture.md generated map
      shell: bash
      run: |
        set -euo pipefail
        node "${{ github.action_path }}/../../../scripts/aggregate_architecture_map.mjs" --check

    - name: Validate /design artifact structure
      shell: bash
      run: |
        set -euo pipefail
        node "${{ github.action_path }}/../../../scripts/check_design_artifact_structure.mjs"
